{% extends "base.html" %}
{% block title %}Complete Profile — Potato Corner{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="container">
    <div class="auth-wrapper auth-wrapper-wide">
      <div class="auth-card">
        <div class="auth-card-header">
          <div class="auth-icon">📍</div>
          <h1 class="auth-title">Complete Your Profile</h1>
          <p class="auth-sub">We need your delivery address to get those fries to you!</p>
        </div>
        <div class="auth-card-body">
          <form method="POST" action="{{ url_for('complete_profile') }}" class="auth-form">
            <div class="form-row-2">
              <div class="form-group-custom">
                <label class="form-label-custom">Full Name</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-user input-icon"></i>
                  <input type="text" name="full_name" class="form-control-custom" value="{{ current_user.full_name }}" required>
                </div>
              </div>
              <div class="form-group-custom">
                <label class="form-label-custom">Phone Number</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-phone input-icon"></i>
                  <input type="text" name="phone" class="form-control-custom" placeholder="09xx-xxx-xxxx" required>
                </div>
              </div>
            </div>
            <div class="form-group-custom">
              <label class="form-label-custom">Street / House No.</label>
              <div class="input-icon-wrap">
                <i class="fas fa-home input-icon"></i>
                <input type="text" name="street" class="form-control-custom" placeholder="123 Mabini St." required>
              </div>
            </div>
            <div class="form-row-2">
              <div class="form-group-custom">
                <label class="form-label-custom">Barangay</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-map-pin input-icon"></i>
                  <input type="text" name="barangay" class="form-control-custom" required>
                </div>
              </div>
              <div class="form-group-custom">
                <label class="form-label-custom">City / Municipality</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-city input-icon"></i>
                  <input type="text" name="city" class="form-control-custom" required>
                </div>
              </div>
            </div>
            <div class="form-row-2">
              <div class="form-group-custom">
                <label class="form-label-custom">Province</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-map input-icon"></i>
                  <input type="text" name="province" class="form-control-custom">
                </div>
              </div>
              <div class="form-group-custom">
                <label class="form-label-custom">ZIP Code</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-mail-bulk input-icon"></i>
                  <input type="text" name="zipcode" class="form-control-custom">
                </div>
              </div>
            </div>
            <button type="submit" class="btn-auth-submit">
              <i class="fas fa-check me-2"></i>Save & Continue
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
