{% extends "base.html" %}
{% block title %}Register — Potato Corner{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-bg-art" aria-hidden="true">
    <div class="auth-circle c1"></div>
    <div class="auth-circle c2"></div>
    <div class="auth-emoji e1">🍟</div>
    <div class="auth-emoji e2">🧀</div>
    <div class="auth-emoji e3">🔥</div>
  </div>
  <div class="container">
    <div class="auth-wrapper auth-wrapper-wide">
      <div class="auth-card">
        <div class="auth-card-header">
          <div class="auth-icon">🎉</div>
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-sub">Join and start ordering delicious fries!</p>
        </div>
        <div class="auth-card-body">
          <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-row-2">
              <div class="form-group-custom">
                <label class="form-label-custom">Full Name</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-user input-icon"></i>
                  <input type="text" name="full_name" class="form-control-custom" placeholder="Juan dela Cruz" required>
                </div>
              </div>
              <div class="form-group-custom">
                <label class="form-label-custom">Username</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-at input-icon"></i>
                  <input type="text" name="username" class="form-control-custom" placeholder="juandelacruz" required>
                </div>
              </div>
            </div>
            <div class="form-row-2">
              <div class="form-group-custom">
                <label class="form-label-custom">Email</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-envelope input-icon"></i>
                  <input type="email" name="email" class="form-control-custom" placeholder="juan@email.com" required>
                </div>
              </div>
              <div class="form-group-custom">
                <label class="form-label-custom">Phone</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-phone input-icon"></i>
                  <input type="text" name="phone" class="form-control-custom" placeholder="09xx-xxx-xxxx">
                </div>
              </div>
            </div>
            <div class="form-group-custom">
              <label class="form-label-custom">Street / House No.</label>
              <div class="input-icon-wrap">
                <i class="fas fa-home input-icon"></i>
                <input type="text" name="street" class="form-control-custom" placeholder="123 Mabini St." required>
              </div>
            </div>
            <div class="form-row-2">
              <div class="form-group-custom">
                <label class="form-label-custom">Barangay</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-map-pin input-icon"></i>
                  <input type="text" name="barangay" class="form-control-custom" placeholder="Brgy. San Jose" required>
                </div>
              </div>
              <div class="form-group-custom">
                <label class="form-label-custom">City</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-city input-icon"></i>
                  <input type="text" name="city" class="form-control-custom" placeholder="Lianga" required>
                </div>
              </div>
            </div>
            <div class="form-row-2">
              <div class="form-group-custom">
                <label class="form-label-custom">Province</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-map input-icon"></i>
                  <input type="text" name="province" class="form-control-custom" placeholder="Surigao del Sur">
                </div>
              </div>
              <div class="form-group-custom">
                <label class="form-label-custom">ZIP Code</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-mail-bulk input-icon"></i>
                  <input type="text" name="zipcode" class="form-control-custom" placeholder="8307">
                </div>
              </div>
            </div>
            <div class="form-row-2">
              <div class="form-group-custom">
                <label class="form-label-custom">Password</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-lock input-icon"></i>
                  <input type="password" name="password" id="pass1" class="form-control-custom" placeholder="Min. 6 characters" required>
                </div>
              </div>
              <div class="form-group-custom">
                <label class="form-label-custom">Confirm Password</label>
                <div class="input-icon-wrap">
                  <i class="fas fa-lock input-icon"></i>
                  <input type="password" name="confirm_password" id="pass2" class="form-control-custom" placeholder="Repeat password" required>
                </div>
              </div>
            </div>
            <button type="submit" class="btn-auth-submit">
              <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
          </form>
          <p class="auth-switch">
            Already have an account? <a href="{{ url_for('admin_login') }}">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
