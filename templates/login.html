{% extends "base.html" %}
{% block title %}Login — Potato Corner{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-bg-art" aria-hidden="true">
    <div class="auth-circle c1"></div>
    <div class="auth-circle c2"></div>
    <div class="auth-emoji e1"><img src="{{ url_for('static', filename='images/potato-corner-logo.png') }}" alt="" style="height:60px;width:auto;opacity:1;"></div>
    <div class="auth-emoji e2">🧀</div>
    <div class="auth-emoji e3">🔥</div>
  </div>
  <div class="container">
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-card-header">
          <div class="auth-icon"><img src="{{ url_for('static', filename='images/potato-corner-logo.png') }}" alt="Potato Corner" style="height:60px;width:auto;"></div>
          <h1 class="auth-title">Welcome Back!</h1>
          <p class="auth-sub">Sign in to order your favorite fries</p>
        </div>
        <div class="auth-card-body">

          <!-- Google Sign-In (primary CTA) -->
          <a href="{{ url_for('google_login') }}" class="btn-google-auth">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </a>

          <div class="auth-divider"><span>or sign in with email</span></div>

          <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group-custom">
              <label class="form-label-custom">Username or Email</label>
              <div class="input-icon-wrap">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" class="form-control-custom" placeholder="Enter username or email" required>
              </div>
            </div>
            <div class="form-group-custom">
              <label class="form-label-custom">Password</label>
              <div class="input-icon-wrap">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" id="passwordField" class="form-control-custom" placeholder="Enter password" required>
                <button type="button" class="btn-eye" onclick="togglePass()">
                  <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
              </div>
            </div>
            <div class="form-check-custom">
              <input type="checkbox" name="remember" id="remember" class="form-check-input-custom">
              <label for="remember">Remember me</label>
            </div>
            <button type="submit" class="btn-auth-submit">
              <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
          </form>

          <p class="auth-switch">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePass() {
  const f = document.getElementById('passwordField');
  const i = document.getElementById('eyeIcon');
  if (f.type === 'password') {
    f.type = 'text';
    i.className = 'fas fa-eye-slash';
  } else {
    f.type = 'password';
    i.className = 'fas fa-eye';
  }
}
</script>
{% endblock %}
